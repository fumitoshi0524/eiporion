name: publish-pypi

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag is on main branch
        run: |
          git fetch origin main
          git merge-base --is-ancestor ${{ github.ref }} origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version '$TAG_VERSION' does not match package version '$PKG_VERSION'"
            exit 1
          fi
          echo "Publishing eiporion v$PKG_VERSION"

      - name: Build package
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build

      - name: Verify wheel contents
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          python -m venv /tmp/check
          /tmp/check/bin/pip install dist/*.whl --no-deps
          /tmp/check/bin/python -c "
          import importlib.metadata as m, os
          v = m.version('eiporion')
          tag = os.environ['TAG_NAME'].lstrip('v')
          assert v == tag, f'wheel version {v} != tag {tag}'
          names = {str(f) for f in m.files('eiporion')}
          assert 'eiporion/__init__.py' in names, '__init__.py missing from wheel'
          print(f'Wheel OK: eiporion=={v}')
          "

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          packages-dir: dist
